# Render Blueprint — one-click backend deploy (API + scheduled worker + Postgres).
# Render dashboard -> New -> Blueprint -> point at this repo. Fill the `sync: false`
# secrets in the Render UI (never commit them). The frontend deploys separately to
# Streamlit Community Cloud (see frontend/README.md).
databases:
  - name: scout-db
    databaseName: scout
    user: scout
    plan: free

services:
  # FastAPI backend: webhook receiver + on-demand runs + findings + queue worker.
  - type: web
    name: scout-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: SCOUT_DATA_SOURCE
        value: shopify
      - key: SCOUT_LLM_MODE
        value: stub            # set to `openai` and add OPENAI_API_KEY for prose findings
      - key: SCOUT_STORE_ID
        value: cortexium
      - key: SCOUT_MCP_TRANSPORT
        value: stdio
      - key: SCOUT_DATABASE_URL
        fromDatabase:
          name: scout-db
          property: connectionString
      - key: SHOPIFY_API_VERSION
        value: "2026-04"
      - key: SHOPIFY_STORE_DOMAIN
        sync: false            # set in Render UI
      - key: SHOPIFY_ADMIN_TOKEN
        sync: false
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false

  # Scheduled backfill: rolls captured orders into the daily metric series.
  - type: worker
    name: scout-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    dockerCommand: python scripts/scheduler.py
    envVars:
      - key: SCOUT_BACKFILL_INTERVAL
        value: "900"
      - key: SCOUT_STORE_ID
        value: cortexium
      - key: SCOUT_DATABASE_URL
        fromDatabase:
          name: scout-db
          property: connectionString
